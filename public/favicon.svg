<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Speech bubble -->
  <rect x="10" y="14" width="36" height="24" rx="6" ry="6" fill="url(#bubble)" stroke="white" stroke-opacity="0.4" stroke-width="1.2"/>
  <polygon points="18,38 14,46 24,38" fill="white" fill-opacity="0.2" stroke="white" stroke-opacity="0.4" stroke-width="1" stroke-linejoin="round"/>

  <!-- G letter -->
  <text
    x="28"
    y="34"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5"
  >G</text>

  <!-- AI sparkle (top-right) -->
  <g transform="translate(47, 13)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="#FCD34D"/>
  </g>

  <!-- Small dots (bottom right, decorative) -->
  <circle cx="46" cy="44" r="1.5" fill="white" fill-opacity="0.5"/>
  <circle cx="50" cy="48" r="1" fill="white" fill-opacity="0.35"/>
  <circle cx="43" cy="49" r="1" fill="white" fill-opacity="0.35"/>
</svg>
